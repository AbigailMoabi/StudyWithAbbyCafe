    <main>
        <section class="feedback">

            <h1>We Value Your Feedback</h1>
            <p>Help us serve you better. Share your thoughts and experience at Study With Abby Café.</p>

            <form action="#" method="post">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="order">What did you order?</label>
                <select id="order" name="order">
                    <option value="">-- Select an option --</option>
                    <option value="coffee">Coffee</option>
                    <option value="noncoffee">Non Coffee</option>
                    <option value="tea">Tea</option>
                    <option value="bites">Bites</option>
                    <option value="combo">Combo</option>
                </select>

                <label>How was your experience?</label>

<input type="radio" name="experience" value="poor"> Poor
<input type="radio" name="experience" value="fair"> Fair
<input type="radio" name="experience" value="good"> Good
<input type="radio" name="experience" value="excellent"> Excellent

<label for="message">Your Message</label>
<textarea id="message" name="message" rows="5" placeholder="Tell us what you think..."></textarea>

<button type="submit">Submit Feedback</button>

            </form>

        </section>
    </main>

      <footer>
        <p>&copy; 2026 Study With Abby Café. All Rights Reserved.</p>

    </footer>

</body>
