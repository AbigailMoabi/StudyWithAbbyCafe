<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study With Abby Café - Feedback</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="logo">
            <img src="logo.png" alt="Study With Abby Café Logo" width="50" height="50" >
            <span>Study With Abby Café</span>
        </div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="feedback.html" class="active">Feedback</a></li>
        </ul>
    </nav>
    <main>
        <section class="feedback">

            <h1>We Value Your Feedback</h1>
            <p>Help us serve you better. Share your thoughts and experience at Study With Abby Café.</p>

            <form id="feedbackForm" action="#" method="get">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <button type="submit" class="btn btn-success rounded-pill px-4">Submit -></button>
                 
                </form>
        </section>
    </main>

      <footer>
        <p>&copy; 2026 Study With Abby Café. All Rights Reserved.</p>
        <p>Gaborone, Botswana</p>
    </footer>

 <script>
    /* this is javascript that shows a thank you message popping up right after the user submits the feedback*/
    document.getElementById(feedbackForm).onsubmit = function(event){
        event.preventDefault();
        alert("Your feedback is highly appreciated. Thank you for your time!");
    };

 </script>

</body>
</html
